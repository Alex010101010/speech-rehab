 "универсальное", "prompt": "Язык до Киева доведёт.", "answer": "Спрашивая людей, можно найти дорогу куда угодно."}, {"id": "pr_012", "level": 1, "theme": "природа", "prompt": "Любишь кататься, люби и саночки возить.", "answer": "Хочешь удовольствия — будь готов и потрудиться."}, {"id": "pr_013", "level": 1, "theme": "универсальное", "prompt": "Как аукнется, так и откликнется.", "answer": "Как ты относишься к людям, так и они отнесутся к тебе."}, {"id": "pr_014", "level": 1, "theme": "природа", "prompt": "Заглянет солнце и к нам в оконце.", "answer": "Придёт радость и удача и к нам тоже."}, {"id": "pr_015", "level": 1, "theme": "универсальное", "prompt": "Будет и на нашей улице праздник.", "answer": "Придёт время — и у нас наступит удача и радость."}, {"id": "pr_016", "level": 1, "theme": "сварка", "prompt": "Без труда не вынешь и рыбку из пруда.", "answer": "Любое дело требует усилий, само ничего не получится."}, {"id": "pr_017", "level": 1, "theme": "природа", "prompt": "Готовь сани летом, а телегу зимой.", "answer": "Готовься к делу заранее, не в последний момент."}, {"id": "pr_018", "level": 1, "theme": "быт", "prompt": "Делу время, а потехе час.", "answer": "Сначала сделай дело, а уже потом отдыхай."}, {"id": "pr_019", "level": 1, "theme": "быт", "prompt": "Хлеб всему голова.", "answer": "Хлеб — самое главное в еде, основа стола."}, {"id": "pr_020", "level": 1, "theme": "быт", "prompt": "Не красна изба углами, а красна пирогами.", "answer": "Дом хорош не убранством, а гостеприимством хозяев."}, {"id": "pr_021", "level": 1, "theme": "универсальное", "prompt": "Не имей сто рублей, а имей сто друзей.", "answer": "Хорошие друзья важнее денег."}, {"id": "pr_022", "level": 1, "theme": "универсальное", "prompt": "Старый друг лучше новых двух.", "answer": "Проверенная временем дружба надёжнее новых знакомств."}, {"id": "pr_024", "level": 1, "theme": "универсальное", "prompt": "Терпение и труд всё перетрут.", "answer": "Упорство и работа помогают справиться с любым делом."}, {"id": "pr_025", "level": 2, "theme": "природа", "prompt": "Не в свои сани не садись.", "answer": "Не берись за то, что тебе не по силам или не твоё дело."}, {"id": "pr_026", "level": 2, "theme": "быт", "prompt": "Не плюй в колодец — пригодится воды напиться.", "answer": "Не порти отношения и вещи, которые ещё могут пригодиться."}, {"id": "pr_027", "level": 2, "theme": "универсальное", "prompt": "По одёжке встречают, а по уму провожают.", "answer": "Сначала судят по виду, но ценят в итоге по уму и делам."}, {"id": "pr_028", "level": 2, "theme": "природа", "prompt": "Лес рубят — щепки летят.", "answer": "В большом деле не обходится без потерь и мелких издержек."}, {"id": "pr_029", "level": 2, "theme": "универсальное", "prompt": "Шила в мешке не утаишь.", "answer": "Правду не скроешь, она всё равно выйдет наружу."}, {"id": "pr_030", "level": 2, "theme": "природа", "prompt": "Один в поле не воин.", "answer": "В одиночку трудно справиться с большим делом."}, {"id": "pr_031", "level": 2, "theme": "универсальное", "prompt": "Береги платье снову, а честь смолоду.", "answer": "С молодых лет береги своё доброе имя и достоинство."}, {"id": "pr_032", "level": 2, "theme": "универсальное", "prompt": "Яблоко от яблони недалеко падает.", "answer": "Дети обычно похожи на своих родителей."}, {"id": "pr_033", "level": 2, "theme": "природа", "prompt": "Как с гуся вода.", "answer": "Человеку всё нипочём, ничто его не задевает."}, {"id": "pr_034", "level": 2, "theme": "универсальное", "prompt": "Жизнь прожить — не поле перейти.", "answer": "Прожить жизнь непросто, в ней много трудностей."}, {"id": "pr_035", "level": 2, "theme": "универсальное", "prompt": "На воре шапка горит.", "answer": "Виноватый невольно сам себя выдаёт."}, {"id": "pr_036", "level": 2, "theme": "рыбалка", "prompt": "Выйти сухим из воды.", "answer": "Избежать наказания или неприятностей, остаться невиноватым."}, {"id": "pr_037", "level": 2, "theme": "рыбалка", "prompt": "Рыбак рыбака видит издалека.", "answer": , "prompt": "огуре_ (с грядки)", "answer": "огурец", "image": "ogurets.png", "accept": ["огурец"]}, {"id": "fl_100", "level": 3, "theme": "быт", "pair": "ц/ч", "prompt": "ре_епт (от врача)", "answer": "рецепт", "image": "retsept.png", "accept": ["рецепт"]}]}, {"type": "reading_texts", "title": "Чтение и понимание текста", "section": "VII. Память и связная речь", "advanced": false, "items": [{"id": "rt_001", "level": 2, "theme": "рыбалка", "title": "Утро на озере", "text": "Рано утром Иван пришёл на озеро. Вода была тихая и гладкая. Он закинул удочку и сел на берег. Над водой поднимался лёгкий туман. Скоро поплавок дрогнул и ушёл под воду. Иван подсёк и вытащил крупного карася. Он улыбнулся и положил рыбу в ведро.", "questions": [{"q": "Куда пришёл Иван утром?", "a": "Иван пришёл на озеро."}, {"q": "Какая была вода?", "a": "Вода была тихая и гладкая."}, {"q": "Что поднималось над водой?", "a": "Над водой поднимался лёгкий туман."}, {"q": "Какую рыбу поймал Иван?", "a": "Иван поймал крупного карася."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_002", "level": 1, "theme": "быт", "title": "Утренний чай", "text": "Каждое утро Пётр пьёт чай. Он ставит чайник на плиту. Пока вода греется, он режет хлеб и сыр. Чайник закипает и громко свистит. Пётр заваривает крепкий чай. Он садится у окна и смотрит во двор. Так начинается его спокойный день.", "questions": [{"q": "Что делает Пётр каждое утро?", "a": "пьёт чай"}, {"q": "Что он режет, пока греется вода?", "a": "хлеб и сыр"}, {"q": "Куда садится Пётр с чаем?", "a": "у окна"}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_003", "level": 1, "theme": "природа", "title": "Дождь в саду", "text": "После обеда небо потемнело. Подул тёплый ветер. Скоро пошёл крупный дождь. Капли застучали по крыше и по листьям. Птицы спрятались под навес. Через полчаса дождь перестал. Над садом появилась яркая радуга.", "questions": [{"q": "Что случилось с небом после обеда?", "a": "потемнело"}, {"q": "Куда спрятались птицы?", "a": "под навес"}, {"q": "Что появилось над садом после дождя?", "a": "радуга"}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_004", "level": 3, "theme": "рыбалка", "title": "Старая лодка", "text": "У Сергея была старая деревянная лодка. Он держал её на берегу под кустами. Однажды весной он решил снова выйти на воду. Сергей проверил вёсла и залатал небольшую щель. Лодка держалась хорошо и не пропускала воду. Он отплыл к середине реки и закинул сети. К вечеру в лодке лежало ведро свежей рыбы. Сергей был доволен старой лодкой.", "questions": [{"q": "Какая лодка была у Сергея?", "a": "У Сергея была старая деревянная лодка."}, {"q": "Что он сделал перед тем, как выйти на воду?", "a": "Он проверил вёсла и залатал небольшую щель."}, {"q": "Куда он отплыл и что сделал?", "a": "Он отплыл к середине реки и закинул сети."}, {"q": "Что лежало в лодке к вечеру?", "a": "В лодке лежало ведро свежей рыбы."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_005", "level": 2, "theme": "быт", "title": "Поход в магазин", "text": "Утром жена попросила Николая сходить в магазин. Она написала список на листке бумаги. Николай взял сумку и пошёл по знакомой дороге. В магазине он купил хлеб, молоко и картофель. Потом вспомнил, что нужны спички. Он вернулся к полке и взял коробок. Дома жена проверила покупки и поблагодарила его.", "questions": [{"q": "О чём попросила жена утром?", "a": "Жена попросила сходить в магазин."}, {"q": "Что купил Николай сначала?", "a": "Он купил хлеб, молоко и картофель."}, {"q": "О чём он вспомнил позже?", "a": "Он вспомнил, что нужны спички."}, {"q": "Что сделала жена дома?", "a": "Жена проверила покупки и поблагодарила его."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_006", "level": 2, "theme": "тв_кино", "title": "Вечер у телевизора", "text": "Вечером Андрей включил телевизор. Шёл фильм про далёкие страны. На экране показывали высокие горы и синее море. Андрею особенно понравились кадры с рыбацкой деревней. Он подумал, что хотел бы там побывать. После фильма началась передача о природе. Андрей досмотрел её и спокойно лёг спать.", "questions": [{"q": "Что включил Андрей вечером?", "a": "Андрей включил телевизор."}, {"q": "Что показывали на экране?", "a": "Показывали высокие горы и синее море."}, {"q": "Какие кадры понравились Андрею?", "a": "Ему понравились кадры с рыбацкой деревней."}, {"q": "Что началось после фильма?", "a": "После фильма началась передача о природе."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_007", "level": 1, "theme": "природа", "title": "Первый снег", "text": "Ночью выпал первый снег. Утром весь двор стал белым и чистым. Деревья надели снежные шапки. Дети вышли во двор и стали лепить снеговика. Воробьи прыгали по дорожке и искали крошки. Воздух был свежим и морозным. Зима наконец пришла в город.", "questions": [{"q": "Когда выпал первый снег?", "a": "ночью"}, {"q": "Каким стал двор утром?", "a": "белым и чистым"}, {"q": "Что делали дети во дворе?", "a": "снеговика"}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_008", "level": 2, "theme": "рыбалка", "title": "Терпеливый рыбак", "text": "Дед Михаил любил рыбачить на тихой речке. Он приходил туда ещё до восхода солнца. В этот день рыба долго не клевала. Другие рыбаки уже собрались уходить. Но Михаил сидел спокойно и ждал. Под вечер у него начался хороший клёв. Он поймал несколько крупных лещей. Терпение всегда помогало старому рыбаку.", "questions": [{"q": "Где любил рыбачить дед Михаил?", "a": "Он любил рыбачить на тихой речке."}, {"q": "Что делали другие рыбаки?", "a": "Другие рыбаки уже собрались уходить."}, {"q": "Что случилось под вечер?", "a": "Под вечер у Михаила начался хороший клёв."}, {"q": "Что всегда помогало рыбаку?", "a": "Терпение всегда помогало старому рыбаку."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_009", "level": 1, "theme": "быт", "title": "Ремонт табурета", "text": "У старого табурета расшаталась ножка. Виктор решил починить его сам. Он достал из кладовки ящик с инструментами. Сначала он подтянул все винты отвёрткой. Потом он смазал клеем расшатанное место. Виктор оставил табурет сохнуть до утра. На следующий день табурет снова стал крепким.", "questions": [{"q": "Что случилось со старым табуретом?", "a": "ножка"}, {"q": "Откуда Виктор достал инструменты?", "a": "из кладовки"}, {"q": "Чем он смазал расшатанное место?", "a": "клеем"}, {"q": "Каким стал табурет на следующий день?", "a": "крепким"}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_010", "level": 2, "theme": "природа", "title": "Грибное место", "text": "В выходной Алексей поехал в лес за грибами. Он хорошо знал одно тихое место под старыми соснами. Утро было прохладным, на траве лежала роса. Среди мха он сразу заметил крепкие боровики. Алексей аккуратно срезал их ножом. Скоро его корзина наполнилась доверху. Довольный, он отправился домой.", "questions": [{"q": "Куда поехал Алексей в выходной?", "a": "Алексей поехал в лес за грибами."}, {"q": "Какое место он хорошо знал?", "a": "Он знал тихое место под старыми соснами."}, {"q": "Какие грибы он заметил среди мха?", "a": "Он заметил крепкие боровики."}, {"q": "Чем закончился поход?", "a": "Корзина наполнилась, и он отправился домой."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_011", "level": 3, "theme": "универсальное", "title": "Письмо", "text": "Однажды старик нашёл в почтовом ящике странное письмо. На конверте не было ни адреса, ни имени отправителя. Внутри лежал только пожелтевший листок с одной фразой. Там было написано: «Загляни в старый сундук на чердаке». Старик давно не поднимался наверх. Он взял свечу и осторожно полез по скрипучей лестнице. В сундуке он нашёл фотографии своей молодости. Кто-то заботливо вернул ему давно забытые воспоминания.", "questions": [{"q": "Что нашёл старик в почтовом ящике?", "a": "Старик нашёл странное письмо."}, {"q": "Что было написано на листке?", "a": "Было написано: «Загляни в старый сундук на чердаке»."}, {"q": "Как он поднялся наверх?", "a": "Он взял свечу и полез по скрипучей лестнице."}, {"q": "Что он нашёл в сундуке?", "a": "Он нашёл фотографии своей молодости."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_012", "level": 3, "theme": "универсальное", "title": "Фонарь на маяке", "text": "На далёком берегу стоял старый маяк. Его смотритель каждый вечер зажигал большой фонарь. Однажды ночью разыгрался сильный шторм. Волны бились о скалы, и ветер выл в темноте. Вдруг фонарь начал гаснуть, керосин почти кончился. Смотритель не растерялся и зажёг старую лампу. Её слабый свет помог рыбацкой лодке найти дорогу. Утром рыбаки пришли поблагодарить старика.", "questions": [{"q": "Что делал смотритель каждый вечер?", "a": "Он зажигал большой фонарь."}, {"q": "Что случилось ночью?", "a": "Ночью разыгрался сильный шторм."}, {"q": "Почему фонарь начал гаснуть?", "a": "Керосин почти кончился."}, {"q": "Чем помог слабый свет лампы?", "a": "Он помог рыбацкой лодке найти дорогу."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_013", "level": 2, "theme": "быт", "title": "Старые часы", "text": "В доме у бабушки давно стояли большие настенные часы. Много лет они исправно отбивали каждый час. Но однажды утром они вдруг остановились. Внук Дмитрий решил их починить. Он осторожно открыл заднюю крышку и осмотрел механизм. Внутри он нашёл застрявшую маленькую пружину. Дмитрий аккуратно поправил её и завёл часы. Снова раздался привычный мерный стук.", "questions": [{"q": "Что стояло в доме у бабушки?", "a": "В доме стояли большие настенные часы."}, {"q": "Что случилось с часами утром?", "a": "Часы вдруг остановились."}, {"q": "Что Дмитрий нашёл внутри?", "a": "Он нашёл застрявшую маленькую пружину."}, {"q": "Чем закончилась починка?", "a": "Снова раздался привычный мерный стук."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_014", "level": 3, "theme": "рыбалка", "title": "Случай на реке", "text": "Двое друзей отправились рыбачить на дальнюю реку. Они выбрали тихую заводь среди камышей. Долго ничего не клевало, и друзья почти заскучали. Вдруг удочка одного из них резко согнулась. На крючке оказалась огромная щука. Рыба сильно тянула и едва не утащила удочку в воду. Друзья вместе вытащили её на берег. Этот день они потом вспоминали много лет.", "questions": [{"q": "Куда отправились двое друзей?", "a": "Друзья отправились рыбачить на дальнюю реку."}, {"q": "Какое место они выбрали?", "a": "Они выбрали тихую заводь среди камышей."}, {"q": "Кто оказался на крючке?", "a": "На крючке оказалась огромная щука."}, {"q": "Что друзья делали потом много лет?", "a": "Они вспоминали этот день."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_015", "level": 3, "theme": "природа", "title": "Ночь в лесу", "text": "Геолог Павел заблудился в лесу, когда уже стемнело. Он развёл небольшой костёр и сел рядом. Вокруг стояла глубокая тишина, только трещали сухие ветки. Иногда вдалеке ухала сова. Павел не испугался, ведь он бывал в тайге много раз. Он подбросил дров и спокойно ждал утра. На рассвете он легко нашёл нужную тропинку. К полудню Павел вышел к своей деревне.", "questions": [{"q": "Что случилось с Павлом, когда стемнело?", "a": "Павел заблудился в лесу."}, {"q": "Что он сделал, чтобы согреться?", "a": "Он развёл небольшой костёр."}, {"q": "Почему он не испугался?", "a": "Он бывал в тайге много раз."}, {"q": "Что он нашёл на рассвете?", "a": "На рассвете он нашёл нужную тропинку."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_016", "level": 2, "theme": "тв_кино", "title": "Старый фильм", "text": "В субботу вечером по телевизору показывали старый фильм. Григорий узнал картину, которую смотрел ещё в молодости. На экране были знакомые улицы и старые автомобили. Он вспомнил, как ходил в кино с друзьями. Тогда билет стоил совсем недорого. Григорий смотрел и тихо улыбался своим мыслям. Хороший фильм вернул ему добрые воспоминания.", "questions": [{"q": "Что показывали по телевизору в субботу?", "a": "По телевизору показывали старый фильм."}, {"q": "Что Григорий узнал?", "a": "Он узнал картину, которую смотрел в молодости."}, {"q": "С кем он раньше ходил в кино?", "a": "Он ходил в кино с друзьями."}, {"q": "Что вернул ему фильм?", "a": "Фильм вернул ему добрые воспоминания."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_017", "level": 3, "theme": "быт", "title": "Сосед и кот", "text": "У соседа Фёдора жил рыжий кот по кличке Рыжик. Кот любил гулять по двору и греться на солнце. Однажды Рыжик пропал на целых три дня. Фёдор расстроился и искал его по всему двору. На четвёртый день кот сам вернулся домой. Он был голодный, но целый и невредимый. Фёдор обрадовался и налил коту полную миску молока.", "questions": [{"q": "Как звали кота соседа?", "a": "Кота звали Рыжик."}, {"q": "На сколько дней пропал кот?", "a": "Кот пропал на три дня."}, {"q": "Когда вернулся Рыжик?", "a": "Кот вернулся на четвёртый день."}, {"q": "Что сделал Фёдор, когда кот вернулся?", "a": "Он налил коту полную миску молока."}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_018", "level": 1, "theme": "рыбалка", "title": "Удочка", "text": "Дед подарил внуку новую удочку. Внук был очень рад подарку. Они вместе пошли на пруд. Дед показал, как насаживать наживку. Внук закинул удочку и стал ждать. Скоро он поймал свою первую рыбку.", "questions": [{"q": "Что дед подарил внуку?", "a": "удочку"}, {"q": "Куда они пошли вместе?", "a": "на пруд"}, {"q": "Что поймал внук?", "a": "рыбку"}], "task": "Прочитайте и перескажите текст."}, {"id": "rt_019", "level": 3, "theme": "универсальное", "title": "Гость в метель", "text": "Зимним вечером в одинокий дом постучали. Хозяин Семён открыл дверь и увидел замёрзшего путника. На улице бушевала сильная метель. Семён впустил гостя и усадил его у тёплой печи. Он напоил его горячим чаем и дал сухую одежду. Путник рассказал, что заблудился по дороге в город. Утром метель утихла, и небо стало ясным. Гость поблагодарил хозяина и продолжил свой путь.", "questions": [{"q": "Кого Семён увидел за дверью?", "a": "Он увид  "словосочетания", "length": 2, "row": ["свежая рыба", "полное ведро"]}, {"id": "mr_094", "level": 2, "theme": "природа", "kind": "словосочетания", "length": 3, "row": ["густой туман", "тихая речка", "ранний рассвет"]}, {"id": "mr_095", "level": 2, "theme": "быт", "kind": "словосочетания", "length": 3, "row": ["крепкий чай", "свежий хлеб", "спокойный вечер"]}, {"id": "mr_096", "level": 3, "theme": "природа", "kind": "словосочетания", "length": 3, "row": ["осенний лес", "жёлтые листья", "перелётные птицы"]}, {"id": "mr_097", "level": 3, "theme": "тв_кино", "kind": "словосочетания", "length": 3, "row": ["старый фильм", "знакомый актёр", "добрая история"]}, {"id": "mr_098", "level": 1, "theme": "природа", "kind": "слова", "length": 2, "row": ["гриб", "мох"]}, {"id": "mr_099", "level": 2, "theme": "быт", "kind": "слова", "length": 4, "row": ["сумка", "список", "магазин", "сдача"]}, {"id": "mr_100", "level": 3, "theme": "рыбалка", "kind": "слова", "length": 7, "row": ["река", "берег", "удочка", "наживка", "поплавок", "клёв", "улов"]}]}, {"type": "retell_texts", "title": "Тексты для отсроченного пересказа по памяти", "section": "VII. Память и связная речь", "advanced": false, "items": [{"id": "rx_001", "level": 3, "theme": "рыбалка", "title": "Большой улов", "text": "Однажды летом дед Андрей собрался на рыбалку с самого раннего утра. Он встал ещё затемно, взял удочки и старое ведро. До озера было около часа пешком через сосновый лес. По дороге пел соловей, и на траве блестела роса. Андрей пришёл на знакомое место и устроился у воды. Долго рыба не клевала, и он почти задремал. Вдруг поплавок резко ушёл под воду. Андрей подсёк и почувствовал сильную тяжесть. На крючке оказался крупный лещ. До обеда он поймал ещё несколько хороших рыбин. Довольный, дед сложил улов в ведро и отправился домой. Вечером вся семья ела свежую уху и хвалила рыбака.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_002", "level": 3, "theme": "быт", "title": "Тёплый дом", "text": "Зимой в старом доме стало особенно уютно. По утрам хозяин Михаил растапливал печь сухими дровами. Скоро по комнатам разливалось приятное тепло. На плите грелся большой чайник. Михаил садился у окна и смотрел, как падает снег. Кот лежал рядом и тихо мурлыкал. После завтрака хозяин брался за домашние дела. Он чинил старую полку и подметал пол. К полудню заходила соседка и приносила свежий хлеб. Они пили чай и неспешно говорили о деревенских новостях. Так в простых заботах проходил спокойный зимний день.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_003", "level": 3, "theme": "природа", "title": "Гроза над озером", "text": "День был жаркий и душный. К полудню на горизонте показались тёмные тучи. Они быстро надвигались на тихое лесное озеро. Ветер усилился и погнал по воде высокие волны. Рыбаки поспешили вытащить лодки на берег. Скоро сверкнула первая молния, и загремел гром. Крупные капли дождя застучали по листьям. Люди укрылись под старым навесом у сторожки. Гроза бушевала почти полчаса, а потом начала стихать. Тучи ушли, и над озером снова засияло солнце. В чистом небе появилась широкая яркая радуга. После грозы воздух стал свежим и прохладным.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_004", "level": 3, "theme": "универсальное", "title": "Старый ключ", "text": "Переехав в старый дом, Семён нашёл в ящике стола ржавый ключ. Ключ был большой и тяжёлый, совсем не похожий на современные. Семён долго думал, от какого он замка. Он обошёл все двери, но ни одна не подходила. Однажды в кладовке он заметил небольшую дверцу под лестницей. Раньше он не обращал на неё внимания. Ключ легко повернулся в старом замке. За дверцей оказался тесный чулан. На полках стояли запылённые банки и старые книги. Среди них Семён нашёл альбом с фотографиями прежних хозяев. Он бережно протёр снимки и поставил альбом на видное место. Так старый ключ открыл ему частицу истории этого дома.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_005", "level": 3, "theme": "рыбалка", "title": "Случай с сетью", "text": "Двое рыбаков, Павел и Степан, вышли на реку рано утром. Они поставили сеть в тихой заводи у камышей. Потом сели в лодку и закурили, поджидая улова. Через час они начали вытягивать сеть из воды. Сеть оказалась тяжёлой и не поддавалась. Друзья решили, что попалась большая рыба. Они тянули изо всех сил и едва не перевернули лодку. Наконец сеть показалась из воды. В ней запуталась старая коряга и пучок водорослей. Рыбаки от души посмеялись над своей удачей. Они освободили сеть и поставили её снова. К вечеру улов всё же был неплохой.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_006", "level": 3, "theme": "тв_кино", "title": "Вечерний фильм", "text": "В пятницу вечером Григорий устроился в любимом кресле перед телевизором. По программе обещали показать старое доброе кино. Он заварил крепкий чай и приготовил тарелку печенья. Фильм рассказывал о моряках в дальнем плавании. На экране были высокие волны и далёкие берега. Григорий вспомнил, как в молодости мечтал о море. Сюжет был спокойным, но держал внимание до конца. Главный герой возвращался домой после долгих странствий. В финале он встречал свою семью на пристани. Григорий смотрел и тихо улыбался. Хорошее кино подарило ему добрый и тёплый вечер.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_007", "level": 3, "theme": "природа", "title": "За грибами", "text": "В сентябре дед Никита позвал внука по грибы. Они встали рано и пошли в ближний лес. Утро было прохладным, на траве лежала густая роса. Дед хорошо знал грибные места под старыми берёзами. Скоро внук нашёл первый крепкий боровик. Дед показал, как правильно срезать гриб ножом. Они аккуратно складывали грибы в плетёную корзину. Среди мха попадались рыжики и подберёзовики. Через два часа корзина наполнилась доверху. По дороге домой они любовались осенним лесом. Бабушка дома обещала пожарить грибы с картошкой. Этот день внук запомнил надолго.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_008", "level": 3, "theme": "универсальное", "title": "Свет в окне", "text": "Старый дом на краю деревни давно стоял пустым. Прохожие говорили, что хозяева уехали много лет назад. Однажды вечером Сергей заметил в окне дома слабый свет. Он удивился, ведь там никто не жил. На следующий день Сергей решил подойти ближе. Дверь оказалась приоткрытой, и он осторожно вошёл внутрь. В комнате он увидел старушку, которая зажигала керосиновую лампу. Это была прежняя хозяйка, вернувшаяся в родной дом. Она рассказала, что приехала навестить родные стены. Сергей помог ей принести дров и затопить печь. С тех пор в окне старого дома снова горел тёплый свет.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_009", "level": 2, "theme": "быт", "title": "Новый сосед", "text": "В соседнюю квартиру въехал новый жилец. Его звали Виктором, и он работал сварщиком. Соседи поначалу присматривались к нему. Виктор оказался спокойным и приветливым человеком. Он часто помогал старикам нести тяжёлые сумки. Однажды у соседки сломался дверной замок. Виктор быстро починил его своими инструментами. За это соседка угостила его пирогом. Скоро весь подъезд хорошо знал нового жильца. Все были рады такому доброму соседу.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_010", "level": 3, "theme": "рыбалка", "title": "Зимняя рыбалка", "text": "Зимой друзья собрались на подлёдную рыбалку. Они приехали на озеро, покрытое толстым льдом. Каждый выбрал себе место и просверлил лунку. Мороз был крепкий, и щёки быстро покраснели. Рыбаки опустили в лунки короткие удочки. Долго никто ничего не ловил. Тогда они развели небольшой костёр на берегу. У огня стало теплее, и настроение поднялось. Под вечер у Ивана начался хороший клёв. Он вытащил несколько крупных окуней. Друзья поделили улов поровну и довольные поехали домой. Дома их ждал горячий ужин.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_011", "level": 3, "theme": "универсальное", "title": "Голос в тумане", "text": "Рыбак Андрей возвращался домой поздним вечером. Над рекой стелился густой белый туман. Лодка медленно скользила по тихой воде. Вдруг сквозь туман донёсся слабый голос. Кто-то звал на помощь с дальнего берега. Андрей насторожился и направил лодку на звук. Грести в тумане было трудно, берега почти не было видно. Наконец он заметил человека, застрявшего на мели. Это был соседский мальчишка, чья лодка села на камень. Андрей помог ему перебраться к себе. Вместе они благополучно добрались до берега. Дома мальчика уже искали встревоженные родители.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_012", "level": 2, "theme": "природа", "title": "Весна в деревне", "text": "Наконец в деревню пришла долгожданная весна. Снег быстро таял под тёплым солнцем. По дорогам побежали говорливые ручьи. На деревьях набухли первые почки. Скворцы вернулись и поселились в старых скворечниках. Люди вышли работать в огороды. Дед Тимофей вскопал грядки и посеял зелень. Воздух был свежим и пах талой землёй. Над полем уже звенел весёлый жаворонок. Вся деревня радовалась приходу весны.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_013", "level": 3, "theme": "быт", "title": "Письмо от внука", "text": "Однажды утром почтальон принёс деду письмо. Дед Прохор давно не получал писем. Он надел очки и сел у окна. Письмо было от внука, который уехал учиться в город. Внук писал, что у него всё хорошо. Он сдал экзамены и нашёл новых друзей. В конце письма внук обещал приехать летом. Дед перечитал письмо несколько раз. Он бережно убрал его в старую шкатулку. Весь день у деда было светло на душе. Вечером он сел писать внуку ответ.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_014", "level": 3, "theme": "природа", "title": "Ночёвка у костра", "text": "Трое рыбаков остались на ночь у лесного озера. Они поставили палатку на ровной поляне. С вечера развели большой костёр. Над огнём в котелке варилась душистая уха. Вокруг стояла глубокая тишина, только потрескивали дрова. Иногда вдалеке ухала сова. Над озером поднялась полная луна. Друзья сидели у костра и рассказывали разные истории. Звёзды ярко горели в чёрном небе. Поздно ночью они улеглись спать в палатке. Утром их разбудило пение птиц. Рассвет над озером был удивительно красивым.", "task": "Прочитайте, перескажите по памяти."}, {"id": "rx_015", "level": 3, "theme": "универсальное", "title": "Старый радиоприёмник", "text": "На чердаке у деда стоял старый радиоприёмник. Много лет он молчал и покрылся пылью. Однажды внук решил его починить. Он осторожно разобрал заднюю крышку. Внутри оказалось много пыли и одна перегоревшая лампа. Внук нашёл похожую лампу в коробке со старыми деталями. Он аккуратно заменил её и собрал приёмник обратно. Когда он включил его, послышался лёгкий треск. Потом сквозь шум зазвучала тихая музыка. Дед услышал знакомую старую песню своей молодости. Он сидел и слушал, прикрыв глаза. В этот вечер дом наполнился добрыми воспоминаниями.", "task": "Прочитайте, перескажите по памяти."}]}, {"type": "clock", "title": "Сколько времени", "section": "VIII. Время", "advanced": false, "items": [{"id": "clk_001", "level": 1, "theme": "быт", "time": "08:00", "answer": "Восемь часов ровно"}, {"id": "clk_002", "level": 1, "theme": "быт", "time": "09:00", "answer": "Девять часов ровно"}, {"id": "clk_003", "level": 1, "theme": "быт", "time": "12:00", "answer": "Двенадцать часов ровно"}, {"id": "clk_004", "level": 1, "theme": "быт", "time": "15:00", "answer": "Пятнадцать часов ровно"}, {"id": "clk_005", "level": 1, "theme": "быт", "time": "18:00", "answer": "Восемнадцать часов ровно"}, {"id": "clk_006", "level": 2, "theme": "быт", "time": "07:30", "answer": "Семь часов тридцать минут"}, {"id": "clk_007", "level": 2, "theme": "быт", "time": "10:15", "answer": "Десять часов пятнадцать минут"}, {"id": "clk_008", "level": 2, "theme": "быт", "time": "11:30", "answer": "Одиннадцать часов тридцать минут"}, {"id": "clk_009", "level": 2, "theme": "быт", "time": "14:30", "answer": "Четырнадцать часов три const TOTAL = 1636;
const KEY = 'speech_review_v1';
let dec = {};
try { dec = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { dec = {}; }

function save() { localStorage.setItem(KEY, JSON.stringify(dec)); stats(); }
function el(t, c) { const e = document.createElement(t); if (c) e.className = c; return e; }
function fld(lbl, val) {
  const d = el('div', 'fld');
  const l = el('div', 'lbl'); l.textContent = lbl;
  const v = el('div', 'val'); v.textContent = val;
  d.append(l, v); return d;
}
function badge(text, cls) { const b = el('span', 'badge' + (cls ? ' ' + cls : '')); b.textContent = text; return b; }

function renderItem(it, type) {
  const card = el('div', 'card');
  card.dataset.id = it.id;
  if (dec[it.id] && dec[it.id].approved) card.classList.add('ok');
  const hd = el('div', 'hd');
  hd.append(badge(type), badge('L' + (it.level || 1)));
  if (it.theme) hd.append(badge(it.theme));
  hd.append(badge(it.id, 'id'));
  card.append(hd);
  if (it.prompt) card.append(fld('Задание', it.prompt));
  if (it.task) card.append(fld('Тип', it.task));
  if (Array.isArray(it.options)) card.append(fld('Варианты', it.options.join('   |   ')));
  if (it.answer) card.append(fld('Ответ', it.answer));
  if (Array.isArray(it.syllables)) card.append(fld('Слоги', it.syllables.join(' · ')));
  if (it.word) card.append(fld('Слово', it.word + (it.match === true ? '  →  Да (совпадает)' : it.match === false ? '  →  Нет (не совпадает)' : '')));
  if (it.image) {
    const wrap = el('div', 'fld');
    const l = el('div', 'lbl'); l.textContent = 'Картинка';
    const img = el('img'); img.src = '../content/img/' + it.image; img.alt = it.image;
    img.style.maxHeight = '160px'; img.style.maxWidth = '100%'; img.style.borderRadius = '8px';
    // если файла нет — показать имя текстом вместо битой картинки
    img.onerror = () => { const v = el('div', 'val'); v.textContent = it.image + ' (нет файла)'; img.replaceWith(v); };
    wrap.append(l, img); card.append(wrap);
  }
  if (Array.isArray(it.accept) && it.accept.length) card.append(fld('Также принимается', it.accept.join(', ')));
  if (Array.isArray(it.display)) card.append(fld('Ряд', it.display.join('   ·   ')));
  else if (Array.isArray(it.row)) card.append(fld('Ряд', it.row.join('   ·   ')));
  if (it.title) card.append(fld('Заголовок', it.title));
  if (it.text) card.append(fld('Текст', it.text));
  if (Array.isArray(it.questions)) it.questions.forEach((q, i) =>
    card.append(fld('Вопрос ' + (i + 1), (q.q || '') + '  →  ' + (q.a || ''))));
  const ctl = el('div', 'ctl');
  const btn = el('button', 'appr');
  const setBtn = () => {
    const on = dec[it.id] && dec[it.id].approved;
    btn.textContent = on ? '✓ Одобрено' : 'Одобрить';
    btn.classList.toggle('on', !!on);
    card.classList.toggle('ok', !!on);
  };
  btn.onclick = () => {
    dec[it.id] = dec[it.id] || {};
    dec[it.id].approved = !dec[it.id].approved;
    setBtn(); save();
  };
  setBtn();
  const ta = el('textarea');
  ta.placeholder = 'Комментарий (необязательно)';
  ta.value = (dec[it.id] && dec[it.id].comment) || '';
  ta.oninput = () => { dec[it.id] = dec[it.id] || {}; dec[it.id].comment = ta.value; save(); };
  ctl.append(btn, ta);
  card.append(ctl);
  return card;
}

function render(filterType) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  DATA.forEach(g => {
    if (filterType && filterType !== g.type) return;
    const h = el('h2', 'sec');
    h.textContent = g.title;
    if (g.advanced) { const a = el('span', 'adv'); a.textContent = 'advanced'; h.append(a); }
    list.append(h);
    g.items.forEach(it => list.append(renderItem(it, g.type)));
  });
  window.scrollTo(0, 0);
}

function stats() {
  let appr = 0, com = 0;
  Object.values(dec).forEach(d => { if (d.approved) appr++; if (d.comment && d.comment.trim()) com++; });
  document.getElementById('stats').textContent =
    'одобрено ' + appr + ' / ' + TOTAL + ' · с комментарием ' + com;
}

// фильтр по типу
const sel = document.getElementById('filter');
const optAll = el('option'); optAll.value = ''; optAll.textContent = 'Все типы (' + TOTAL + ')';
sel.append(optAll);
DATA.forEach(g => { const o = el('option'); o.value = g.type; o.textContent = g.title + ' (' + g.items.length + ')'; sel.append(o); });
sel.onchange = () => render(sel.value);

// экспорт / импорт
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(dec, null, 2)], { type: 'application/json' });
  const a = el('a'); a.href = URL.createObjectURL(blob);
  a.download = 'review-decisions.json'; a.click();
};
document.getElementById('importFile').onchange = (ev) => {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const loaded = JSON.parse(r.result);
      Object.keys(loaded).forEach(k => { dec[k] = Object.assign(dec[k] || {}, loaded[k]); });
      save(); render(sel.value);
      alert('Загружено решений: ' + Object.keys(loaded).length);
    } catch (e) { alert('Не удалось прочитать файл: ' + e); }
  };
  r.readAsText(f);
};

render('');
stats();
</script></body></html>
