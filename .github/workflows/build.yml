name: build

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Собрать APK (установочник для Android)'
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Быстрое превью: только веб (~1.5–2 мин). Идёт на каждый push.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      # Вшитый снимок контента — производная от content/ (в git не хранится).
      - name: Build content snapshot
        working-directory: ${{ github.workspace }}
        run: python3 tools/build_assets.py

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Платформенные папки генерируем здесь (в репо только lib/ + assets + pubspec).
      - name: Generate web platform
        run: flutter create --platforms=web --org dev.rech --project-name rech .

      - run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href /speech-rehab/

      # OTA-канал: тот же контент + manifest.json кладём под /ota на Pages,
      # чтобы приложение могло тянуть свежие задания без переустановки.
      - name: Assemble OTA payload
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p app/build/web/ota
          cp -r app/assets/content/. app/build/web/ota/
          rm -rf app/build/web/ota/img/MANIFEST.json app/build/web/ota/img/ATTRIBUTION.md app/build/web/ota/img/README.md
          python3 tools/build_manifest.py app/build/web/ota

      - name: Upload Web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy-pages:
    needs: web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # APK самый долгий (~5 мин), нужен только для установки на Android.
  # Собираем вручную: вкладка Actions → build → Run workflow.
  apk:
    if: github.event_name == 'workflow_dispatch' && inputs.build_apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Build content snapshot
        working-directory: ${{ github.workspace }}
        run: python3 tools/build_assets.py

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate android platform
        run: flutter create --platforms=android --org dev.rech --project-name rech .

      # INTERNET нужен для OTA; в release-манифесте flutter его по умолчанию нет.
      - name: Add INTERNET permission
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$M" || \
            sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.INTERNET"/>#' "$M"
          head -4 "$M"

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rech-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
