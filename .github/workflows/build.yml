name: build

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Собрать APK (установочник для Android)'
        type: boolean
        default: true

permissions:
  contents: write   # write — чтобы apk-джоба публиковала GitHub Release (Tier B)
  pages: write
  id-token: write

jobs:
  # Быстрое превью: только веб (~1.5–2 мин). Идёт на каждый push.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      # Вшитый снимок контента — производная от content/ (в git не хранится).
      - name: Build content snapshot
        working-directory: ${{ github.workspace }}
        run: python3 tools/build_assets.py

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Платформенные папки генерируем здесь (в репо только lib/ + assets + pubspec).
      - name: Generate web platform
        run: flutter create --platforms=web --org dev.rech --project-name rech .

      - run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href /speech-rehab/

      # OTA-канал: тот же контент + manifest.json кладём под /ota на Pages,
      # чтобы приложение могло тянуть свежие задания без переустановки.
      - name: Assemble OTA payload
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p app/build/web/ota
          cp -r app/assets/content/. app/build/web/ota/
          rm -rf app/build/web/ota/img/MANIFEST.json app/build/web/ota/img/ATTRIBUTION.md app/build/web/ota/img/README.md
          python3 tools/build_manifest.py app/build/web/ota

      - name: Upload Web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy-pages:
    needs: web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # APK самый долгий (~5 мин), нужен только для установки на Android.
  # Собираем вручную: вкладка Actions → build → Run workflow.
  apk:
    if: github.event_name == 'workflow_dispatch' && inputs.build_apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Build content snapshot
        working-directory: ${{ github.workspace }}
        run: python3 tools/build_assets.py

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate android platform
        run: flutter create --platforms=android --org dev.rech --project-name rech .

      # Release-подпись: декодируем keystore из секрета, пишем key.properties,
      # патчер впрыскивает signingConfig в сгенерённый build.gradle. Без этого
      # flutter подписал бы release debug-ключом (эфемерным) → обновление APK
      # «поверх» на устройстве было бы невозможно (несовпадение подписи).
      - name: Configure release signing
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          {
            printf 'storePassword=%s\n' "$KS_PASS"
            printf 'keyPassword=%s\n' "$KEY_PASS"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=%s\n' "$RUNNER_TEMP/release.jks"
          } > android/key.properties
          python3 ../tools/inject_android_signing.py android

      # INTERNET — для OTA/самообновления; REQUEST_INSTALL_PACKAGES — чтобы открыть
      # установщик скачанного APK (Tier B). В release-манифесте flutter их нет.
      - name: Add Android permissions
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$M" || \
            sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.INTERNET"/>#' "$M"
          grep -q 'REQUEST_INSTALL_PACKAGES' "$M" || \
            sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>#' "$M"
          head -6 "$M"

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rech-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      # Tier B: публикуем подписанный APK в GitHub Release + манифест самообновления.
      # Приложение тянет манифест с releases/latest/download/app_manifest.json.
      - name: Publish release (Tier B)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/app/outputs/flutter-apk/app-release.apk
          BUILD=$(grep '^version:' app/pubspec.yaml | sed 's/.*+//' | tr -d ' ')
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//' | tr -d ' ')
          TAG="build-$BUILD"
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/app-release.apk"
          python3 tools/build_app_manifest.py "$APK" "$BUILD" "$VERSION" "$URL" app_manifest.json
          # Пересоздаём релиз с тем же тегом начисто (на случай повторной сборки того же build).
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "$APK" app_manifest.json \
            --title "speech-rehab $VERSION (build $BUILD)" \
            --notes "Автосборка. Самообновление APK через Tier B (releases/latest)."
